<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.2rem; font-weight: 600; color: #58a6ff; }
    header span { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 2px 8px; border-radius: 12px; border: 1px solid #30363d; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 800px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }
    .user .bubble { background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
    .assistant .bubble { background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 4px; }
    .label { font-size: 0.7rem; color: #8b949e; margin-bottom: 4px; padding: 0 4px; }
    .user .label { text-align: right; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.85rem; }
    #input-area { padding: 16px 24px; border-top: 1px solid #21262d; display: flex; gap: 12px; align-items: flex-end; }
    #prompt { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 10px; color: #e6edf3; padding: 12px 16px; font-size: 0.9rem; resize: none; min-height: 48px; max-height: 200px; outline: none; font-family: inherit; }
    #prompt:focus { border-color: #58a6ff; }
    #send { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; white-space: nowrap; }
    #send:hover { background: #2ea043; }
    #send:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    .cursor { display: inline-block; width: 2px; height: 1em; background: #58a6ff; animation: blink 1s infinite; vertical-align: text-bottom; margin-left: 2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #status { font-size: 0.75rem; color: #8b949e; padding: 0 24px 8px; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ CodeMind</h1>
    <span>Mini LLM · Novel Architecture</span>
  </header>
  <div id="chat">
    <div class="msg assistant">
      <div class="label">CodeMind</div>
      <div class="bubble">Hello! I'm CodeMind, a novel coding AI. Ask me anything about code — I'll help you write, debug, and understand it.</div>
    </div>
  </div>
  <div id="status"></div>
  <div id="input-area">
    <textarea id="prompt" placeholder="Ask CodeMind anything about code..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const prompt = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const status = document.getElementById('status');

    let ws = null;
    let currentBubble = null;
    let currentText = '';

    function connect() {
      ws = new WebSocket(`ws://${location.host}/ws/chat`);
      ws.onopen = () => { status.textContent = '● Connected'; };
      ws.onclose = () => { status.textContent = '○ Disconnected — reconnecting...'; setTimeout(connect, 2000); };
      ws.onerror = () => { status.textContent = '✕ Connection error'; };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'token') {
          currentText += msg.content;
          if (currentBubble) {
            currentBubble.innerHTML = formatText(currentText) + '<span class="cursor"></span>';
          }
          chat.scrollTop = chat.scrollHeight;
        } else if (msg.type === 'done') {
          if (currentBubble) {
            currentBubble.innerHTML = formatText(currentText);
          }
          currentBubble = null;
          currentText = '';
          sendBtn.disabled = false;
          prompt.focus();
        }
      };
    }

    function formatText(text) {
      // Simple code block formatting
      return text
        .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'CodeMind'}</div><div class="bubble">${formatText(text)}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div.querySelector('.bubble');
    }

    function send() {
      const text = prompt.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      currentBubble = addMessage('assistant', '');
      currentText = '';
      sendBtn.disabled = true;
      prompt.value = '';
      prompt.style.height = 'auto';

      ws.send(JSON.stringify({ type: 'message', content: text }));
    }

    sendBtn.addEventListener('click', send);
    prompt.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    prompt.addEventListener('input', () => {
      prompt.style.height = 'auto';
      prompt.style.height = Math.min(prompt.scrollHeight, 200) + 'px';
    });

    connect();
  </script>
</body>
</html>
